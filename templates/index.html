<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minecraft For Dummies Bot</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', monospace;
}

body {
    background: linear-gradient(145deg, #1a4d2a, #0e3a1f);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* CONTAINER */
.chat-container {
    width: 100%;
    max-width: 950px;
    height: 85vh;
    background: #2b2b2b;
    border-radius: 28px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    border: 3px solid #5c3e1f;
}

/* HEADER */
.chat-header {
    background: #3b2a1f;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: #ffdd99;
    border-bottom: 4px solid #d4af37;
}

.chat-header h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
}

.icon {
    width: 26px;
    height: 26px;
    image-rendering: pixelated;
}

.badge {
    margin-left: auto;
    background: #1f1a10;
    padding: 6px 12px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8rem;
    color: #ffe9a6;
}

.icon-small {
    width: 18px;
    height: 18px;
}

/* QUICK BUTTONS */
.quick-buttons {
    background: #1f2a16;
    padding: 10px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
}

.quick-btn {
    background: #3b5124;
    border: none;
    color: #ffefb9;
    padding: 6px 12px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 0.75rem;
}

.quick-btn:hover {
    background: #5e8242;
}

/* CHAT AREA */
.messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 18px;
    background: #f1e8cf;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

/* MESSAGES */
.message {
    max-width: 80%;
    padding: 12px 14px;
    border-radius: 18px;
}

.user-message {
    align-self: flex-end;
    background: #3b8c3e;
    color: white;
}

.assistant-message {
    align-self: flex-start;
    background: white;
    border-left: 5px solid #6b8c42;
}

/* INPUT */
.input-area {
    display: flex;
    padding: 12px;
    gap: 10px;
    background: #2c2a24;
}

.input-area input {
    flex: 1;
    padding: 12px;
    border-radius: 50px;
    border: none;
}

.input-area button {
    background: #f3b33d;
    border: none;
    padding: 0 18px;
    border-radius: 50px;
    cursor: pointer;
}

/* LOADING */
.loading-indicator {
    display: none;
    justify-content: center;
    align-items: center;
    gap: 10px;
    padding: 10px;
    color: white;
}

.spinner {
    width: 18px;
    height: 18px;
    border: 3px solid #aaa;
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* STEVE FIX */
.header-steve {
    width: 42px;
    height: 42px;
    object-fit: cover;
    image-rendering: pixelated;
    border-radius: 6px;
    border: 2px solid #d4af37;
}
</style>
</head>

<body>

<div class="chat-container">

    <!-- HEADER -->
    <div class="chat-header">
        <img src="{{ url_for('static', filename='icons/steve.jpg') }}" class="header-steve">

        <h1>
            Minecraft For Dummies Bot
        </h1>

        <div class="badge">
            <img src="{{ url_for('static', filename='icons/dragon.jpg') }}" class="icon-small">
            Rumbo a la Enderdragón
        </div>
    </div>

    <!-- QUICK PROMPTS -->
    <div class="quick-buttons">
        <button class="quick-btn" data-q="Guía desde el día 1 hasta la Enderdragón">📜 Guía completa</button>
        <button class="quick-btn" data-q="Cómo hacer pico de piedra y mesa de crafteo">🛠️ Crafteos</button>
        <button class="quick-btn" data-q="Estoy en el Nether sin fortaleza">🔥 Nether</button>
        <button class="quick-btn" data-q="Cómo matar enderman fácilmente">👾 Mobs</button>
        <button class="quick-btn" data-q="Dónde encontrar diamantes rápido">💎 Diamantes</button>
    </div>

    <!-- CHAT -->
    <div class="messages-area" id="messagesArea">

        <div class="message assistant-message">
            🧙 ¡Hola aventurero! Soy tu guía definitivo de Minecraft. Pregúntame sobre mobs, biomas, crafteos, o cuéntame cualquier situación que estés viviendo en el juego. ¡Te ayudaré paso a paso hasta que venzas a la Enderdragón! 💪🐉
        </div>

    </div>

    <!-- INPUT -->
    <div class="input-area">
        <input id="userInput" placeholder="Escribe tu pregunta...">
        <button id="sendBtn"><img src="{{ url_for('static', filename='icons/paper_plane.png') }}" alt="Enviar" class="icon"></button>
    </div>

    <!-- LOADING -->
    <div class="loading-indicator" id="loading">
        <div class="spinner"></div>
        Analizando mundo...
    </div>

</div>

<script>
let history = [
    { role: "assistant", content: " 🧙 ¡Hola aventurero! Soy tu guía definitivo de Minecraft. Pregúntame sobre mobs, biomas, crafteos, o cuéntame cualquier situación que estés viviendo en el juego. ¡Te ayudaré paso a paso hasta que venzas a la Enderdragón! 💪🐉" } 
];

const messages = document.getElementById("messagesArea");
const input = document.getElementById("userInput");
const loading = document.getElementById("loading");

function render() {
    messages.innerHTML = "";
    history.forEach(m => {
        const div = document.createElement("div");
        div.className = "message " + (m.role === "user" ? "user-message" : "assistant-message");
        div.innerHTML = m.content;
        messages.appendChild(div);
    });
}

async function send() {
    const text = input.value.trim();
    if (!text) return;

    history.push({ role: "user", content: text });
    render();
    input.value = "";

    loading.style.display = "flex";

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ messages: history })
    });

    const data = await res.json();

    history.push({ role: "assistant", content: data.reply });
    render();

    loading.style.display = "none";
}

document.getElementById("sendBtn").onclick = send;

input.addEventListener("keypress", e => {
    if (e.key === "Enter") send();
});

document.querySelectorAll(".quick-btn").forEach(btn => {
    btn.onclick = () => {
        input.value = btn.dataset.q;
        send();
    };
});

render();
</script>

</body>
</html>
